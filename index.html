<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bear Prospect</title>
    <style>
        *, *:before, *:after {box-sizing: border-box;}
        body {
          margin: 40px;
          font-family: -apple-system,BlinkMacSystemFont,"Segoe UI Emoji","Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,sans-serif;
          background-color: #000;
          color: #fff;
        }
        h1,
        p {
          margin: 0 0 1em 0;
        }
        .wrapper {
          /* max-width: 940px; */
          margin: 0 20px;
          display: grid;
          grid-gap: 10px;
        }
        /* no grid support? */
        .wrapper {
          display: flex;
          flex-wrap: wrap;
        }
        .wrapper {
          display: grid;
          margin: 0 auto;
          grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
          grid-auto-rows: minmax(400px, auto);
        }
        .panel {
          /* needed for the flex layout*/
          margin-left: 5px;
          margin-right: 5px;
          flex: 1 1 400px;
        }
        .header,
        .footer {
          margin-left: 5px;
          margin-right: 5px;
          flex: 0 1 100%;
          grid-column: 1 / -1;
        }
        .wrapper > * {
          /* background-color: #444; */
          color: #000;
          border-radius: 5px;
          padding: 20px;
          font-size: .85em;
          margin-bottom: 10px;
          text-align: center;
        }
        .panel > img {
          width: 100%;
          margin: auto;
          height: auto;
        }
        /* We need to set the margin used on flex items to 0 as we have gaps in grid.  */
        @supports (display: grid) {
          .wrapper > * {
            margin: 0;
          }
        }
        img.p {border-radius: 5px;}
    </style>
</head>
<body>

<h1>Black Bear Prospect</h1>
<div class="wrapper">
    <div class="panel" style="background-color: #ccc;"><img class="p" src="bbp-1-bk-pocket-t.jpg" alt=""></div>
    <div class="panel" style="background-color: #ccc;"><img class="p" src="bbp-1-bk-t-shirt.jpg" alt=""></div>
