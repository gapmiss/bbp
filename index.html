<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bear Prospect</title>
    <style>
        *, *:before, *:after {box-sizing: border-box;}
        body {
          margin: 40px;
          font-family: 'Open Sans', 'sans-serif';
          background-color: #fff;
          color: #444;
        }
        h1,
        p {
          margin: 0 0 1em 0;
        }
        .wrapper {
          max-width: 940px;
          margin: 0 20px;
          display: grid;
          grid-gap: 10px;
        }
        /* no grid support? */
        .wrapper {
          display: flex;
          flex-wrap: wrap;
        }
        .wrapper {
          display: grid;
          margin: 0 auto;
          grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
          grid-auto-rows: minmax(200px, auto);
        }
        .panel {
          /* needed for the flex layout*/
          margin-left: 5px;
          margin-right: 5px;
          flex: 1 1 200px;
        }
        .header,
        .footer {
          margin-left: 5px;
          margin-right: 5px;
          flex: 0 1 100%;
          grid-column: 1 / -1;
        }
        .wrapper > * {
          /* background-color: #444; */
          color: #fff;
          border-radius: 5px;
          padding: 20px;
          font-size: 150%;
          margin-bottom: 10px;
        }
        .panel > img {
          max-width: 200px;
          margin: auto;
        }
        /* We need to set the margin used on flex items to 0 as we have gaps in grid.  */
        @supports (display: grid) {
          .wrapper > * {
            margin: 0;
          }
        }
    </style>
</head>
<body>

<h1>Black Bear Prospect</h1>
<div class="wrapper">    
    <div class="panel" style="background-color: #3d3c3a;">#3d3c3a<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #98afc7;">#98afc7<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #ada96e;">#ada96e<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
    <div class="panel" style="background-color: #;">#<br><img src="bbp-1-bk.png" /></div>
  </div>

</body>
</html>
